default_install_hook_types: [commit-msg, pre-commit, pre-push]
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        stages: [pre-commit]
        additional_dependencies:
          - prettier@3.8.4

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        name: Git Lint
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
        exclude: "package.json|package-lock.json|.*test.*\\.ts$|\\.pre-commit-config\\.yaml$|\\.github/workflows/checkov\\.yml$|\\.secrets\\.baseline$"
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: no-commit-to-branch

  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458 # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        exclude: "package.json|package-lock.json|src/.*/.*.test.ts|locales/.*.json|.pre-commit-config.yaml$"
        args: ["--baseline", ".secrets.baseline"]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: npm-audit
        name: NPM Audit
        pass_filenames: false
        entry: "npm run audit"
        language: system

      - id: integration-tests-check
        name: Integration tests check
        entry: npm --prefix integration-tests run validate
        language: system
        files: ^integration-tests/
        pass_filenames: false
