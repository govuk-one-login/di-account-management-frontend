name: Validate passkeys convenience metadata

permissions: {}

on:
  pull_request:
  merge_group:

jobs:
  check:
    name: Validate passkeys convenience metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm run install-all

      - name: Validate passkeys convenience metadata
        run: |
          npx tsx -e '
            import { getAllPasskeyConvenienceMetadata } from "./src/utils/passkeysConvenienceMetadata/index.ts";

            getAllPasskeyConvenienceMetadata().then((metadata) => {
              console.log("Metadata is valid");
            }).catch((err: unknown) => {
              throw err
            });
          '
