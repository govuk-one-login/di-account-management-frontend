name: Detect secrets

permissions: {}

on:
  pull_request:
  merge_group:

jobs:
  detect-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: "pip install --require-hashes --only-binary :all: -r .github/workflows/requirements.txt"

      - name: Detect secrets
        run: git ls-files -z | xargs -0 python -m detect_secrets.pre_commit_hook --verbose --baseline .secrets.baseline
