name: Checkov

on:
  pull_request:
  merge_group:

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pragma: allowlist secret

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # pragma: allowlist secret
        with:
          directory: deploy
          output_format: cli
          output_file_path: console
          # TODO jira ticket OLH-4086: Temporary skip - CKV_AWS_124 requires CloudFormation stacks to send event notifications to an SNS topic.
          # Remove once notification_arns has been added to all affected stacks.
          skip_check: CKV_AWS_124
