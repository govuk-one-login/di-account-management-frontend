---
name: "Validation & Verification checks against Dev instance"

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  id-token: write # zizmor: ignore[excessive-permissions]
  contents: read

jobs:
  validate_application:
    name: App Checks
    uses: ./.github/workflows/build-test-application.yaml
    secrets: inherit # zizmor: ignore[secrets-inherit]

  validate_container:
    name: Container Checks against Dev Instance
    uses: ./.github/workflows/validate-docker-image-dev.yaml
    secrets: inherit # zizmor: ignore[secrets-inherit]
    needs: validate_application

  validate_deployment:
    name: Deployment Template Checks against Dev Instance
    uses: ./.github/workflows/validate-sam-template-dev.yaml
    secrets: inherit # zizmor: ignore[secrets-inherit]
    needs: validate_container
